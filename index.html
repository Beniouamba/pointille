<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Square - Jeu de Points Colorés</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35;
            --secondary: #004E89;
            --accent: #FFD23F;
            --success: #06D6A0;
            --danger: #EF476F;
            --dark: #1A1A2E;
            --light: #F8F9FA;
            --grid-bg: #FFFFFF;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        html, body { touch-action: pan-x pan-y; overscroll-behavior: none; }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .app-container { min-height: 100vh; padding: 1rem; }

        .header { text-align: center; padding: 2rem 1rem; animation: fadeInDown 0.8s ease-out; }
        .logo {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }
        .tagline { color: var(--light); font-size: clamp(0.9rem, 2vw, 1.2rem); font-weight: 300; opacity: 0.9; }

        .language-toggle {
            position: fixed; top: 1rem; right: 1rem; z-index: 100;
            background: rgba(255,255,255,0.95); padding: 0.5rem 1rem; border-radius: 12px;
            box-shadow: 0 4px 12px var(--shadow); display: flex; gap: 0.5rem; align-items: center;
        }
        .lang-button {
            padding: 0.5rem 1rem; border: 2px solid transparent; background: transparent; border-radius: 8px;
            cursor: pointer; font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 0.9rem; color: var(--dark);
            transition: all 0.3s ease;
        }
        .lang-button.active { background: var(--primary); color: white; border-color: var(--primary); }
        .lang-button:hover:not(.active) { background: #F0F0F0; }

        /* ── TOP NAV TABS ── */
        .top-tabs {
            display: flex; gap: 0; justify-content: center; margin-bottom: 1.5rem;
            background: rgba(255,255,255,0.15); border-radius: 14px; padding: 4px; max-width: 400px; margin: 0 auto 1.5rem;
        }
        .top-tab {
            flex: 1; padding: 0.7rem 1.2rem; border: none; background: transparent; border-radius: 10px;
            cursor: pointer; font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 0.95rem;
            color: rgba(255,255,255,0.7); transition: all 0.3s ease;
        }
        .top-tab.active { background: white; color: var(--dark); box-shadow: 0 2px 8px rgba(0,0,0,0.15); }

        /* ── SETUP ── */
        .setup-screen {
            max-width: 900px; margin: 0 auto;
            background: rgba(255,255,255,0.98); border-radius: 24px;
            padding: clamp(1.5rem, 4vw, 3rem);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeInUp 0.8s ease-out 0.2s backwards;
        }
        .setup-title { font-size: clamp(1.5rem, 4vw, 2rem); font-weight: 700; color: var(--dark); margin-bottom: 2rem; text-align: center; }
        .setup-section { margin-bottom: 2rem; }
        .section-label { font-size: 1.1rem; font-weight: 600; color: var(--secondary); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .section-label::before { content: ''; width: 4px; height: 20px; background: var(--primary); border-radius: 2px; }

        .button-group { display: flex; flex-wrap: wrap; gap: 0.75rem; }
        .option-button {
            flex: 1; min-width: 120px; padding: 1rem 1.5rem; border: 2px solid #E0E0E0;
            background: white; border-radius: 12px; cursor: pointer; transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 600; color: var(--dark);
        }
        .option-button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px var(--shadow); }
        .option-button.selected { border-color: var(--primary); background: var(--primary); color: white; transform: scale(1.05); }

        .grid-size-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; }
        .player-setup { display: flex; flex-direction: column; gap: 1rem; }
        .player-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 1.5rem; border-radius: 16px; display: flex; flex-wrap: wrap; align-items: center; gap: 1rem;
            box-shadow: 0 4px 12px var(--shadow);
        }
        .player-info { flex: 1; min-width: 150px; }
        .player-name { font-weight: 600; font-size: 1.1rem; color: var(--dark); margin-bottom: 0.5rem; }
        .color-picker { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .color-option { width: 40px; height: 40px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: all 0.3s ease; }
        .color-option:hover { transform: scale(1.1); }
        .color-option.selected { border-color: white; box-shadow: 0 0 0 2px var(--dark); transform: scale(1.15); }

        .difficulty-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
        .diff-card {
            padding: 1.2rem; border: 2px solid #E0E0E0; background: white;
            border-radius: 16px; cursor: pointer; transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif; text-align: left;
        }
        .diff-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px var(--shadow); }
        .diff-card.selected { transform: translateY(-3px); }
        .diff-card.selected.easy   { border-color: #06D6A0; background: #f0fdf8; }
        .diff-card.selected.medium { border-color: #FF9800; background: #fff8f0; }
        .diff-card.selected.hard   { border-color: #EF476F; background: #fff0f4; }
        .diff-emoji { font-size: 2rem; margin-bottom: 0.4rem; }
        .diff-name { font-weight: 700; font-size: 1rem; color: var(--dark); margin-bottom: 0.3rem; }
        .diff-desc { font-size: 0.78rem; color: #666; font-weight: 400; line-height: 1.4; }

        .start-button {
            width: 100%; padding: 1.5rem;
            background: linear-gradient(135deg, var(--primary) 0%, #FF8C61 100%);
            color: white; border: none; border-radius: 16px; font-size: 1.3rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s ease; margin-top: 1rem;
            box-shadow: 0 8px 24px rgba(255,107,53,0.4); font-family: 'Outfit', sans-serif;
        }
        .start-button:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(255,107,53,0.5); }

        /* ── GAME ── */
        .game-screen { max-width: 1600px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; }
        .game-header {
            display: flex; flex-wrap: wrap; gap: 1rem; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.95); padding: 1rem 1.5rem; border-radius: 16px;
            box-shadow: 0 4px 20px var(--shadow);
        }
        .current-player { font-size: 1.2rem; font-weight: 600; display: flex; align-items: center; gap: 0.75rem; color: var(--dark); }
        .player-indicator { width: 24px; height: 24px; border-radius: 50%; border: 3px solid var(--dark); animation: pulse 2s infinite; }
        .ai-thinking { display: flex; align-items: center; gap: 0.5rem; color: #666; font-size: 0.95rem; font-style: italic; }
        .thinking-dots span { display: inline-block; animation: thinkingDot 1.4s infinite; font-size: 1.2rem; }
        .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes thinkingDot { 0%,80%,100%{opacity:0.3;transform:scale(0.8)}40%{opacity:1;transform:scale(1.2)} }
        .game-controls { display: flex; gap: 0.75rem; flex-wrap: wrap; }
        .control-button {
            padding: 0.75rem 1.5rem; border: none; border-radius: 10px;
            font-family: 'Outfit', sans-serif; font-weight: 600; cursor: pointer; transition: all 0.3s ease; font-size: 0.95rem;
        }
        .control-button.new-game { background: var(--success); color: white; }
        .control-button.forfeit  { background: var(--danger); color: white; }
        .control-button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px var(--shadow); }

        .game-content { display: grid; grid-template-columns: 1fr auto; gap: 1.5rem; align-items: start; }
        @media(max-width:1024px){ .game-content{ grid-template-columns:1fr; } }

        .scoreboard {
            background: rgba(255,255,255,0.95); padding: 1.5rem; border-radius: 16px;
            box-shadow: 0 4px 20px var(--shadow); min-width: 280px;
        }
        .scoreboard-title { font-size: 1.3rem; font-weight: 700; color: var(--dark); margin-bottom: 1.5rem; text-align: center; }
        .score-list { display: flex; flex-direction: column; gap: 1rem; }
        .score-item {
            display: flex; justify-content: space-between; align-items: center; padding: 1rem;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8eef3 100%); border-radius: 12px; transition: all 0.3s ease;
        }
        .score-item.active {
            background: linear-gradient(135deg, var(--accent) 0%, #FFE066 100%);
            transform: scale(1.05); box-shadow: 0 4px 16px rgba(255,210,63,0.4);
        }
        .score-player { display: flex; align-items: center; gap: 0.75rem; }
        .score-color { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--dark); }
        .score-name { font-weight: 600; font-size: 1.05rem; }
        .score-value { font-size: 1.5rem; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--primary); }

        .board-container {
            background: var(--grid-bg); padding: clamp(1rem, 3vw, 2rem); border-radius: 16px;
            box-shadow: 0 8px 32px var(--shadow); overflow: auto; display: flex; justify-content: center; align-items: center;
        }
        .game-board { display: inline-block; position: relative; }
        .board-svg { display: block; max-width: 100%; height: auto; }
        .dot-interactive { cursor: pointer; }

        .difficulty-badge {
            display: inline-block; padding: 0.3rem 0.8rem; border-radius: 8px;
            font-size: 0.8rem; font-weight: 700; letter-spacing: 0.05em;
        }
        .difficulty-easy   { background: #d4edda; color: #155724; }
        .difficulty-medium { background: #fff3cd; color: #856404; }
        .difficulty-hard   { background: #f8d7da; color: #721c24; }

        /* ── WINNER ── */
        .winner-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center;
            z-index: 1000; animation: fadeIn 0.5s ease-out;
        }
        .winner-content {
            background: white; padding: 3rem; border-radius: 24px; text-align: center;
            max-width: 500px; width: 90%; animation: scaleIn 0.5s ease-out;
        }
        .winner-title {
            font-size: clamp(2rem,5vw,3rem); font-weight: 900;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 1rem;
        }
        .winner-name { font-size: 1.8rem; font-weight: 700; color: var(--dark); margin-bottom: 2rem; }
        .final-scores { margin-bottom: 2rem; }
        .final-score-item { display: flex; justify-content: space-between; padding: 0.75rem; margin-bottom: 0.5rem; background: #F5F5F5; border-radius: 8px; }

        /* ── MANUAL ── */
        .manual-screen {
            max-width: 860px; margin: 0 auto;
            background: rgba(255,255,255,0.98); border-radius: 24px;
            padding: clamp(1.5rem, 4vw, 3rem);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeInUp 0.6s ease-out;
        }
        .manual-title {
            font-size: clamp(1.6rem, 4vw, 2.2rem); font-weight: 900; color: var(--dark);
            margin-bottom: 0.4rem; display: flex; align-items: center; gap: 0.6rem;
        }
        .manual-subtitle { color: #888; font-size: 1rem; margin-bottom: 2rem; font-weight: 400; }

        .manual-section { margin-bottom: 2rem; }
        .manual-section-title {
            font-size: 1.15rem; font-weight: 700; color: var(--secondary);
            margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; padding-bottom: 0.5rem;
            border-bottom: 2px solid #EEE;
        }
        .manual-section-title .icon { font-size: 1.3rem; }

        .manual-p { color: #444; line-height: 1.7; margin-bottom: 0.8rem; font-size: 0.97rem; }
        .manual-ol { padding-left: 1.4rem; color: #444; line-height: 1.8; font-size: 0.97rem; }
        .manual-ol li { margin-bottom: 0.4rem; }

        .tip-card {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border-left: 4px solid var(--secondary);
            border-radius: 10px; padding: 1rem 1.2rem; margin-bottom: 0.8rem;
        }
        .tip-card strong { color: var(--secondary); }
        .tip-card p { color: #444; font-size: 0.93rem; line-height: 1.6; margin-top: 0.25rem; }

        .diff-row {
            display: flex; gap: 1rem; margin-bottom: 0.8rem; flex-wrap: wrap;
        }
        .diff-pill {
            flex: 1; min-width: 160px; border-radius: 12px; padding: 1rem 1.2rem;
        }
        .diff-pill.easy   { background: #d4edda; }
        .diff-pill.medium { background: #fff3cd; }
        .diff-pill.hard   { background: #fde8ec; }
        .diff-pill-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 0.3rem; }
        .diff-pill p { font-size: 0.83rem; color: #555; line-height: 1.5; }

        .diagram-grid {
            display: inline-grid;
            gap: 2px;
            background: #eee;
            border-radius: 8px;
            padding: 8px;
            margin: 0.5rem 0 0.8rem;
        }
        .diagram-cell {
            width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: 700;
        }
        .dc-empty { background: #ddd; }
        .dc-blue  { background: #2196F3; color: white; }
        .dc-red   { background: #F44336; color: white; }
        .dc-sq    { background: rgba(33,150,243,0.35); border: 2px solid #2196F3; border-radius: 4px; color: #2196F3; }

        .square-visual {
            display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
            width: 80px; height: 80px; margin: 0.5rem 0 0.8rem;
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeIn      { from{opacity:0}  to{opacity:1} }
        @keyframes fadeInDown  { from{opacity:0;transform:translateY(-30px)} to{opacity:1;transform:translateY(0)} }
        @keyframes fadeInUp    { from{opacity:0;transform:translateY(30px)}  to{opacity:1;transform:translateY(0)} }
        @keyframes scaleIn     { from{opacity:0;transform:scale(0.8)}        to{opacity:1;transform:scale(1)} }
        @keyframes squareAppear { 0%{opacity:0;transform:scale(0.5)} 60%{transform:scale(1.1)} 100%{opacity:1;transform:scale(1)} }
        @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.1);opacity:0.8} }

        @media(max-width:768px){
            .header{padding:1.5rem 1rem} .setup-screen{padding:1.5rem}
            .option-button{min-width:100px;padding:0.75rem 1rem;font-size:0.9rem}
            .board-container{padding:1rem} .difficulty-cards{grid-template-columns:1fr}
        }
        @media(max-width:480px){
            .game-header{padding:1rem} .current-player{font-size:1rem}
            .control-button{padding:0.6rem 1rem;font-size:0.85rem} .scoreboard{min-width:auto}
        }
    </style>
</head>

        tip4:"Concentrate your dots in one area. Each dot can belong to multiple squares at once: a single well-placed dot can complete 2 or 3 squares simultaneously!",
        tip5t:"Strategic sacrifice",
        tip5:"Sometimes letting the opponent take one square to build a position that gives you 3 is an excellent trade. Think in terms of net gain.",
        diff_easy_t:"😊 Easy",
        diff_easy:"Pure random placement. The AI doesn't think. Perfect for children or learning the rules.",
        diff_med_t:"🧠 Medium",
        diff_med:"The AI takes all immediate squares, blocks your 1-move threats, and builds clusters. It can surprise you!",
        diff_hard_t:"🔥 Hard",
        diff_hard:"Minimax with alpha-beta pruning, multi-factor evaluation, 2- and 3-corner near-square detection, reaction chain anticipation. Very hard to beat.",
    }
};

const COLORS = {
    blue:   '#2196F3',
    red:    '#F44336',
    yellow: '#FFC107',
    green:  '#4CAF50',
    purple: '#9C27B0',
    orange: '#FF9800'
};

// ─── SQUARE DETECTION ──────────────────────────────────────────────────────────
function detectSquares(dots, rows, cols, existingSquares) {
    const formed = [];
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            if (existingSquares.some(s => s.row === r && s.col === c)) continue;
            const tl = dots[`${r}-${c}`];
            const tr = dots[`${r}-${c+1}`];
            const bl = dots[`${r+1}-${c}`];
            const br = dots[`${r+1}-${c+1}`];
            if (tl && tl === tr && tl === bl && tl === br)
                formed.push({ row: r, col: c, color: tl });
        }
    }
    return formed;
}

// ─── AI UTILITIES ──────────────────────────────────────────────────────────────

function getAvailable(dots, rows, cols) {
    const av = [];
    for (let r = 0; r <= rows; r++)
        for (let c = 0; c <= cols; c++)
            if (!dots[`${r}-${c}`]) av.push({ row: r, col: c });
    return av;
}

// How many squares does placing `color` at (row,col) immediately complete?
function immediateGain(dots, row, col, color, rows, cols, existingSquares) {
    const testDots = { ...dots, [`${row}-${col}`]: color };
    return detectSquares(testDots, rows, cols, existingSquares).filter(s => s.color === color).length;
}

// Count squares opponent `oppColor` would immediately complete if they play at (row,col)
function opponentGain(dots, row, col, oppColor, rows, cols, existingSquares) {
    const testDots = { ...dots, [`${row}-${col}`]: oppColor };
    return detectSquares(testDots, rows, cols, existingSquares).filter(s => s.color === oppColor).length;
}

// For each grid cell, count corners of given color
function cellCornerCount(dots, sqR, sqC, color) {
    const corners = [
        dots[`${sqR}-${sqC}`],
        dots[`${sqR}-${sqC+1}`],
        dots[`${sqR+1}-${sqC}`],
        dots[`${sqR+1}-${sqC+1}`]
    ];
    return {
        mine:  corners.filter(c => c === color).length,
        other: corners.filter(c => c && c !== color).length,
        empty: corners.filter(c => !c).length
    };
}

// ─── MEDIUM AI ─────────────────────────────────────────────────────────────────
// Phase 1: take immediate squares (sorted by gain)
// Phase 2: block opponent immediate threats (sorted by threat magnitude)
// Phase 3: build near own dots — score by how many 2-corner setups we create
// Phase 4: slight random among top candidates

function scoreMedium(dots, row, col, aiColor, opponentColors, rows, cols, existingSquares) {
    const testDots = { ...dots, [`${row}-${col}`]: aiColor };

    // Own immediate gain (very high priority)
    const gain = immediateGain(dots, row, col, aiColor, rows, cols, existingSquares) * 1000;

    // Block: how many opponent immediate threats does this cell neutralize?
    let blockScore = 0;
    for (const oc of opponentColors) {
        blockScore += opponentGain(dots, row, col, oc, rows, cols, existingSquares) * 500;
    }

    // Setup: count cells where we now have 2 or 3 corners (after placing)
    let setup = 0;
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const { mine, other } = cellCornerCount(testDots, r, c, aiColor);
            if (other === 0) {
                if (mine === 3) setup += 80;
                else if (mine === 2) setup += 20;
            }
        }
    }

    return gain + blockScore + setup;
}

// ─── HARD AI — MINIMAX + ALPHA-BETA ───────────────────────────────────────────

// Position evaluation: score the board from aiColor's perspective
function evaluatePosition(dots, rows, cols, existingSquares, aiColor, opponentColors) {
    let score = 0;

    // Count formed squares
    for (const sq of existingSquares) {
        if (sq.color === aiColor) score += 100;
        else score -= 100;
    }

    // Evaluate near-square potential for each cell
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const { mine, other, empty } = cellCornerCount(dots, r, c, aiColor);

            if (other === 0) {
                // Pure AI cell
                if (mine === 3) score += 60;     // one away from square
                else if (mine === 2) score += 15; // two away
                else if (mine === 1) score += 3;
            }

            for (const oc of opponentColors) {
                const opp = cellCornerCount(dots, r, c, oc);
                if (opp.other === 0) {
                    if (opp.mine === 3) score -= 55;
                    else if (opp.mine === 2) score -= 14;
                    else if (opp.mine === 1) score -= 2;
                }
            }
        }
    }

    return score;
}

// Returns { score, move }
// `turnColors` is the rotation of colors starting with current player
function minimax(dots, rows, cols, existingSquares, turnColors, aiColor, depth, alpha, beta, maximizing) {
    const available = getAvailable(dots, rows, cols);

    if (depth === 0 || available.length === 0) {
        return { score: evaluatePosition(dots, rows, cols, existingSquares, aiColor, turnColors.filter(c => c !== aiColor)) };
    }

    const currentColor = turnColors[0];
    const nextTurnColors = [...turnColors.slice(1), turnColors[0]];

    // Move ordering: try immediate wins first, then threats, then rest
    const opponentColors = turnColors.filter(c => c !== currentColor);
    const scoredMoves = available.map(d => {
        const g = immediateGain(dots, d.row, d.col, currentColor, rows, cols, existingSquares);
        let blockVal = 0;
        for (const oc of opponentColors)
            blockVal = Math.max(blockVal, opponentGain(dots, d.row, d.col, oc, rows, cols, existingSquares));
        return { ...d, priority: g * 1000 + blockVal * 500 };
    });
    scoredMoves.sort((a, b) => b.priority - a.priority);

    // Limit branching: consider top N moves to keep depth feasible
    const topMoves = scoredMoves.slice(0, Math.min(scoredMoves.length, depth >= 3 ? 8 : 16));

    if (maximizing) {
        let best = -Infinity, bestMove = topMoves[0];
        for (const d of topMoves) {
            const newDots = { ...dots, [`${d.row}-${d.col}`]: currentColor };
            const formed = detectSquares(newDots, rows, cols, existingSquares).filter(s => s.color === currentColor);
            const newSquares = formed.length ? [...existingSquares, ...formed] : existingSquares;

            // If scored, same player goes again (depth same)
            const nextDepth = depth - (formed.length === 0 ? 1 : 0);
            const nextTurn = formed.length > 0 ? turnColors : nextTurnColors;

            const { score } = minimax(newDots, rows, cols, newSquares, nextTurn, aiColor, nextDepth - (formed.length > 0 ? 1 : 0), alpha, beta, currentColor === aiColor);
            const adjusted = score + (formed.length > 0 && currentColor === aiColor ? formed.length * 100 : 0)
                                   - (formed.length > 0 && currentColor !== aiColor ? formed.length * 100 : 0);
            if (adjusted > best) { best = adjusted; bestMove = d; }
            alpha = Math.max(alpha, best);
            if (beta <= alpha) break;
        }
        return { score: best, move: bestMove };
    } else {
        let best = Infinity, bestMove = topMoves[0];
        for (const d of topMoves) {
            const newDots = { ...dots, [`${d.row}-${d.col}`]: currentColor };
            const formed = detectSquares(newDots, rows, cols, existingSquares).filter(s => s.color === currentColor);
            const newSquares = formed.length ? [...existingSquares, ...formed] : existingSquares;

            const nextDepth = depth - (formed.length === 0 ? 1 : 0);
            const nextTurn = formed.length > 0 ? turnColors : nextTurnColors;

            const { score } = minimax(newDots, rows, cols, newSquares, nextTurn, aiColor, nextDepth - (formed.length > 0 ? 1 : 0), alpha, beta, currentColor === aiColor);
            const adjusted = score - (formed.length > 0 && currentColor !== aiColor ? formed.length * 100 : 0);
            if (adjusted < best) { best = adjusted; bestMove = d; }
            beta = Math.min(beta, best);
            if (beta <= alpha) break;
        }
        return { score: best, move: bestMove };
    }
}

// Multi-phase hard AI: minimax + rich heuristics
function hardAIPick(dots, rows, cols, existingSquares, aiColor, allColors) {
    const available = getAvailable(dots, rows, cols);
    if (available.length === 0) return null;

    const opponentColors = allColors.filter(c => c !== aiColor);
    const totalCells = (rows + 1) * (cols + 1);
    const filled = Object.keys(dots).length;
    const fillRatio = filled / totalCells;

    // ── Phase 1: Take immediate square(s) — greedy, take the max ──────────────
    const winMoves = available.map(d => ({
        ...d, gain: immediateGain(dots, d.row, d.col, aiColor, rows, cols, existingSquares)
    })).filter(d => d.gain > 0);
    if (winMoves.length > 0) {
        winMoves.sort((a, b) => b.gain - a.gain);
        return winMoves[0];
    }

    // ── Phase 2: Block critical threats (opponent has 3 corners = deadly) ──────
    const criticalBlocks = [];
    for (const oc of opponentColors) {
        for (const d of available) {
            const g = opponentGain(dots, d.row, d.col, oc, rows, cols, existingSquares);
            if (g > 0) criticalBlocks.push({ ...d, threatGain: g, oc });
        }
    }
    if (criticalBlocks.length > 0) {
        criticalBlocks.sort((a, b) => b.threatGain - a.threatGain);
        return criticalBlocks[0];
    }

    // ── Phase 3: Detect "setup traps" — opponent has 2 corners, we can block early ──
    // Also detect cells where WE have 2 corners and can build the L-shape
    const strategicMoves = available.map(d => {
        const testDots = { ...dots, [`${d.row}-${d.col}`]: aiColor };
        let mySetup3 = 0, mySetup2 = 0, oppDanger2 = 0, oppDanger3 = 0;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                // My future near-squares after placing here
                const my = cellCornerCount(testDots, r, c, aiColor);
                if (my.other === 0) {
                    if (my.mine === 3) mySetup3 += 1;
                    else if (my.mine === 2) mySetup2 += 1;
                }
                // Opponent's near-squares (that this move blocks)
                for (const oc of opponentColors) {
                    const op = cellCornerCount(testDots, r, c, oc);
                    if (op.mine === 3 && op.other === 0) oppDanger3 += 1;
                    else if (op.mine === 2 && op.other === 0) oppDanger2 += 1;
                }
            }
        }

        // Also check: does this move prevent opponent from forming an L-shape next turn?
        // Count how many cells would become 2-corner for opponent if they played here instead
        let oppGainIfTheyPlay = 0;
        for (const oc of opponentColors) {
            const testOpp = { ...dots, [`${d.row}-${d.col}`]: oc };
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const op = cellCornerCount(testOpp, r, c, oc);
                    if (op.mine === 3 && op.other === 0) oppGainIfTheyPlay += 3;
                    else if (op.mine === 2 && op.other === 0) oppGainIfTheyPlay += 1;
                }
            }
        }

        const score = mySetup3 * 120 + mySetup2 * 30
                    - oppDanger3 * 110 - oppDanger2 * 25
                    + oppGainIfTheyPlay * 15;

        return { ...d, score };
    });

    strategicMoves.sort((a, b) => b.score - a.score);

    // ── Phase 4: Minimax look-ahead (depth varies by board fill) ──────────────
    // More depth early, less at endgame (more cells = more options = slower)
    const depth = available.length > 30 ? 3 : available.length > 15 ? 4 : 5;

    // Only run minimax if board is not too big (performance guard)
    const runMinimax = (rows * cols) <= 100;

    if (runMinimax) {
        const turnColors = [aiColor, ...opponentColors];
        const { move } = minimax(dots, rows, cols, existingSquares, turnColors, aiColor, depth, -Infinity, Infinity, true);
        if (move) {
            // Combine minimax suggestion with strategic score
            const mmMove = strategicMoves.find(m => m.row === move.row && m.col === move.col);
            const mmScore = mmMove ? mmMove.score : 0;
            // Weight: minimax dominant, but if strategic score is much higher for another cell, consider it
            const blended = strategicMoves.map(m => ({
                ...m,
                final: (m.row === move.row && m.col === move.col ? 500 : 0) + m.score * 0.3
            }));
            blended.sort((a, b) => b.final - a.final);
            return blended[0];
        }
    }

    // Fallback: pure strategic heuristic
    return strategicMoves[0] || available[Math.floor(Math.random() * available.length)];
}

// ─── MASTER AI DISPATCHER ──────────────────────────────────────────────────────
function aiPickMove(dots, rows, cols, existingSquares, aiColor, allColors, difficulty) {
    const available = getAvailable(dots, rows, cols);
    if (available.length === 0) return null;

    if (difficulty === 'easy') {
        return available[Math.floor(Math.random() * available.length)];
    }

    if (difficulty === 'medium') {
        const opponentColors = allColors.filter(c => c !== aiColor);

        // Score every available cell
        const scored = available.map(d => ({
            ...d,
            score: scoreMedium(dots, d.row, d.col, aiColor, opponentColors, rows, cols, existingSquares)
        }));
        scored.sort((a, b) => b.score - a.score);

        const best = scored[0].score;

        // If best score is 0 (no clear move), pick randomly from top 40%
        if (best === 0) {
            const pool = scored.slice(0, Math.max(1, Math.ceil(scored.length * 0.4)));
            return pool[Math.floor(Math.random() * pool.length)];
        }

        // Among moves with equal best score, pick randomly (slight unpredictability)
        const tied = scored.filter(d => d.score >= best * 0.9);
        return tied[Math.floor(Math.random() * Math.min(tied.length, 3))];
    }

    if (difficulty === 'hard') {
        return hardAIPick(dots, rows, cols, existingSquares, aiColor, allColors);
    }

    return available[Math.floor(Math.random() * available.length)];
}

    ]);
    const [curIdx, setCurIdx]     = useState(0);
    const [dots, setDots]         = useState({});
    const [squares, setSquares]   = useState([]);
    const [aiThinking, setAiThinking] = useState(false);

    const stateRef = useRef({ dots, squares, players, curIdx, gameState, gridSize });
    useEffect(() => {
        stateRef.current = { dots, squares, players, curIdx, gameState, gridSize };
    });

    useEffect(() => {
        if (gameState !== 'setup') return;
        const keys = Object.keys(COLORS);
        const next = [];
        for (let i = 0; i < numPlayers; i++) {
            next.push({
                id: i+1,
                name: `${t.player} ${i+1}`,
                color: keys[i % keys.length],
                isAI: vsAI && i > 0,
                score: 0
            });
        }
        setPlayers(next);
    }, [numPlayers, vsAI, lang, gameState]);

    // ── Core turn logic ───────────────────────────────────────────────────────
    const applyMove = useCallback((row, col, _dots, _squares, _players, _curIdx, _gridSize) => {
        if (gameState !== 'playing') return;
        if (_dots[`${row}-${col}`]) return;

        const player   = _players[_curIdx];
        const newDots  = { ..._dots, [`${row}-${col}`]: player.color };
        const formed   = detectSquares(newDots, _gridSize.rows, _gridSize.cols, _squares);
        const mine     = formed.filter(s => s.color === player.color);

        let newSquares = _squares;
        let newPlayers = _players;

        if (mine.length > 0) {
            const base     = _squares.filter(s => s.color === player.color).length;
            const numbered = mine.map((sq, i) => ({ ...sq, number: base + i + 1 }));
            newSquares = [..._squares, ...numbered];
            newPlayers = _players.map((p, i) =>
                i === _curIdx ? { ...p, score: p.score + mine.length } : p
            );
        }

        const nextIdx  = (_curIdx + 1) % _players.length;
        const totalDots = (_gridSize.rows + 1) * (_gridSize.cols + 1);
        const done     = Object.keys(newDots).length >= totalDots;

        setDots(newDots);
        setSquares(newSquares);
        setPlayers(newPlayers);
        setCurIdx(nextIdx);

        if (done) { setTimeout(() => setGameState('finished'), 400); return; }

        if (_players[nextIdx].isAI) {
            setAiThinking(true);
            const delay = aiDiff === 'hard' ? 900 : aiDiff === 'medium' ? 550 : 350;
            setTimeout(() => {
                const s = stateRef.current;
                if (s.gameState !== 'playing') { setAiThinking(false); return; }
                const allColors = s.players.map(p => p.color);
                const move = aiPickMove(
                    newDots, s.gridSize.rows, s.gridSize.cols,
                    newSquares, s.players[nextIdx].color,
                    allColors, aiDiff
                );
                setAiThinking(false);
                if (move) applyMove(move.row, move.col, newDots, newSquares, newPlayers, nextIdx, s.gridSize);
            }, delay);
        }
    }, [gameState, aiDiff]);

    const handleDotClick = (row, col) => {
        const { dots:d, squares:sq, players:pl, curIdx:ci, gridSize:gs } = stateRef.current;
        if (pl[ci].isAI || aiThinking) return;
        applyMove(row, col, d, sq, pl, ci, gs);
    };

    const startGame = () => {
        const reset = players.map(p => ({ ...p, score: 0 }));
        setPlayers(reset); setDots({}); setSquares([]); setCurIdx(0); setAiThinking(false);
        setGameState('playing');
        if (reset[0].isAI) {
            setAiThinking(true);
            const allColors = reset.map(p => p.color);
            setTimeout(() => {
                const move = aiPickMove({}, gridSize.rows, gridSize.cols, [], reset[0].color, allColors, aiDiff);
                setAiThinking(false);
                if (move) applyMove(move.row, move.col, {}, [], reset, 0, gridSize);
            }, 600);
        }
    };

    const newGame  = () => { setGameState('setup'); setDots({}); setSquares([]); setCurIdx(0); setAiThinking(false); };
    const forfeit  = () => { setGameState('finished'); setAiThinking(false); };

        if (players.some(p => p.id !== id && p.color === color)) return;

                    {[2,3,4].map(n => (
                        <button key={n} className={`option-button ${numPlayers===n?'selected':''}`}
                            onClick={() => setNumPlayers(n)}>
                            {n} {n>1?t.players:t.player}
                        </button>
                    ))}
                </div>
            </div>

            <div className="setup-section">
                <div className="section-label">{t.gameMode}</div>
                <div className="button-group">
                    <button className={`option-button ${!vsAI?'selected':''}`} onClick={() => setVsAI(false)}>👥 {t.playersOnly}</button>
                    <button className={`option-button ${vsAI?'selected':''}`}  onClick={() => setVsAI(true)}>🤖 {t.vsComputer}</button>
                </div>
            </div>

            {vsAI && (
                <div className="setup-section">
                    <div className="section-label">{t.aiDifficulty}</div>
                    <div className="difficulty-cards">
                        {[
                            { key:'easy',   label:t.easy,       desc:t.easyDesc,   emoji:'😊', cls:'easy'   },
                            { key:'medium', label:t.mediumDiff, desc:t.mediumDesc, emoji:'🧠', cls:'medium' },
                            { key:'hard',   label:t.hard,       desc:t.hardDesc,   emoji:'🔥', cls:'hard'   }
                        ].map(({key,label,desc,emoji,cls}) => (
                            <div key={key}
                                className={`diff-card ${cls} ${aiDiff===key?'selected':''}`}
                                onClick={() => setAiDiff(key)}>
                                <div className="diff-emoji">{emoji}</div>
                                <div className="diff-name">{label}</div>

                            </div>
                        ))}
                    </div>

                                        return (

                                                onClick={() => !taken && updateColor(player.id, name)}

    );

        const cellSize = Math.min(52, Math.max(28, Math.floor((Math.min(window.innerWidth, 800) - 80) / (gridSize.cols + 1))));
        const dotR = Math.max(5, Math.floor(cellSize * 0.16));
        const w = (gridSize.cols + 1) * cellSize;
        const h = (gridSize.rows + 1) * cellSize;

        return (
            <svg className="board-svg" width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{touchAction:'none'}}>
                {Array.from({length:gridSize.rows},(_,r) =>
                    Array.from({length:gridSize.cols},(_,c) => (
                        <rect key={`g${r}-${c}`}
                            x={c*cellSize} y={r*cellSize} width={cellSize} height={cellSize}
                            fill="none" stroke="#E8E8E8" strokeWidth="1" strokeDasharray="3,3"/>
                    ))
                )}

                {squares.map((sq,i) => (
                    <g key={`sq${i}`} style={{animation:'squareAppear 0.4s ease-out'}}>
                        <rect x={sq.col*cellSize+2} y={sq.row*cellSize+2}
                            width={cellSize-4} height={cellSize-4} rx="4"
                            fill={COLORS[sq.color]} fillOpacity="0.45"
                            stroke={COLORS[sq.color]} strokeWidth="2.5"/>
                        <text x={sq.col*cellSize+cellSize/2} y={sq.row*cellSize+cellSize/2}
                            textAnchor="middle" dominantBaseline="middle"
                            fontSize={Math.max(10,cellSize*0.35)} fontFamily="DM Mono, monospace"
                            fontWeight="700" fill={COLORS[sq.color]} fillOpacity="0.9" pointerEvents="none">
                            {sq.number}
                        </text>
                    </g>
                ))}

                {Array.from({length:gridSize.rows+1},(_,r) =>
                    Array.from({length:gridSize.cols+1},(_,c) => {
                        const key = `${r}-${c}`;
                        const placed = dots[key];
                        return (
                            <g key={`d${r}-${c}`}
                                className={placed?'':'dot-interactive'}
                                onClick={() => !placed && handleDotClick(r,c)}
                                style={{cursor:placed?'default':(aiThinking||(players[curIdx]&&players[curIdx].isAI))?'wait':'pointer'}}>
                                {!placed && <circle cx={c*cellSize} cy={r*cellSize} r={dotR+6} fill="transparent"/>}
                                <circle cx={c*cellSize} cy={r*cellSize}
                                    r={placed?dotR+1:dotR-1}
                                    fill={placed?COLORS[placed]:'#CCC'}
                                    stroke={placed?'white':'none'} strokeWidth={placed?2:0}/>
                            </g>
                        );
                    })
                )}
            </svg>
        );
    };

    // ── RENDER: Game ──────────────────────────────────────────────────────────
    const renderGame = () => {
        const cur = players[curIdx];
        return (
            <div className="game-screen">
                <div className="game-header">
                    <div style={{display:'flex',flexDirection:'column',gap:'0.3rem'}}>
                        <div className="current-player">
                            <div className="player-indicator" style={{backgroundColor:cur?COLORS[cur.color]:'#999'}}/>
                            <span>{t.turnOf} {cur?cur.name:''} {cur&&cur.isAI&&t.ai}</span>
                        </div>
                        {aiThinking && (
                            <div className="ai-thinking">
                                {t.aiThinking}
                                <span className="thinking-dots">
                                    <span>●</span><span>●</span><span>●</span>
                                </span>
                            </div>
                        )}
                    </div>
                    <div className="game-controls">
                        <button className="control-button new-game" onClick={newGame}>{t.newGame}</button>
                        <button className="control-button forfeit"  onClick={forfeit}>{t.forfeit}</button>
                    </div>
                </div>

                <div className="game-content">
                    <div className="board-container">
                        <div className="game-board">{renderBoard()}</div>
                    </div>
                    <div className="scoreboard">
                        <div className="scoreboard-title">{t.scoreboard}</div>
                        <div className="score-list">
                            {players.map((p,i) => (
                                <div key={p.id} className={`score-item ${i===curIdx?'active':''}`}>
                                    <div className="score-player">
                                        <div className="score-color" style={{backgroundColor:COLORS[p.color]}}/>
                                        <span className="score-name">{p.isAI?'🤖 ':''}{p.name}</span>
                                    </div>
                                    <div className="score-value">{p.score}</div>
                                </div>
                            ))}
                        </div>
                        {vsAI && (
                            <div style={{marginTop:'1rem',textAlign:'center'}}>
                                <span className={`difficulty-badge difficulty-${aiDiff}`}>
                                    {aiDiff==='easy'?'😊 ':aiDiff==='medium'?'🧠 ':'🔥 '}
                                    {aiDiff==='easy'?t.easy:aiDiff==='medium'?t.mediumDiff:t.hard}
                                </span>
                            </div>
                        )}
                    </div>
                </div>
            </div>
        );
    };

    // ── RENDER: Winner ────────────────────────────────────────────────────────
    const renderWinner = () => {
        const sorted = [...players].sort((a,b) => b.score - a.score);
        const best   = sorted[0];
        const isDraw = sorted.filter(p => p.score === best.score).length > 1;
        return (
            <div className="winner-screen">
                <div className="winner-content">
                    <div className="winner-title">{isDraw ? t.draw : t.victory}</div>
                    {!isDraw && (
                        <div className="winner-name" style={{color:COLORS[best.color]}}>
                            {best.isAI ? '🤖 ' : '🏆 '}{best.name}
                        </div>
                    )}
                    <div className="final-scores">
                        {sorted.map(p => (
                            <div key={p.id} className="final-score-item">
                                <div style={{display:'flex',alignItems:'center',gap:'0.5rem'}}>
                                    <div style={{width:16,height:16,borderRadius:'50%',backgroundColor:COLORS[p.color]}}/>
                                    <span>{p.isAI?'🤖 ':''}{p.name}</span>
                                </div>
                                <strong>{p.score} {p.score>1?t.squares:t.square}</strong>
                            </div>
                        ))}
                    </div>
                    <button className="start-button" onClick={newGame}>{t.newGame} 🔄</button>
                </div>
            </div>
        );
    };

    // ── RENDER: Manual ────────────────────────────────────────────────────────
    const renderManual = () => (
        <div className="manual-screen">
            <h2 className="manual-title">📖 {t.manualTitle}</h2>
            <p className="manual-subtitle">{t.manualSub}</p>

            {/* Objective */}
            <div className="manual-section">
                <div className="manual-section-title"><span className="icon">🎯</span>{t.sec1}</div>
                <p className="manual-p" dangerouslySetInnerHTML={{__html: t.obj1}}/>
                <p className="manual-p" dangerouslySetInnerHTML={{__html: t.obj2}}/>

                {/* Visual demo: a square */}
                <div style={{display:'flex',alignItems:'center',gap:'1.5rem',flexWrap:'wrap',margin:'0.5rem 0 1rem'}}>
                    <div>
                        <svg width="100" height="100" viewBox="0 0 100 100">
                            <rect x="5" y="5" width="90" height="90" fill="rgba(33,150,243,0.25)" stroke="#2196F3" strokeWidth="2.5" rx="6"/>
                            {[[10,10],[10,90],[90,10],[90,90]].map(([cx,cy],i)=>
                                <circle key={i} cx={cx} cy={cy} r="10" fill="#2196F3" stroke="white" strokeWidth="2.5"/>
                            )}
                            <text x="50" y="55" textAnchor="middle" fontSize="22" fontWeight="900" fill="#2196F3" fontFamily="DM Mono,monospace">1</text>
                        </svg>
                    </div>
                    <div style={{color:'#555',fontSize:'0.93rem',maxWidth:'260px',lineHeight:'1.6'}}>
                        {lang==='fr'
                            ? '← 4 points bleus aux 4 coins = un carré bleu marqué !'
                            : '← 4 blue dots at all 4 corners = one scored blue square!'}
                    </div>
                </div>
            </div>

            {/* How to play */}
            <div className="manual-section">
                <div className="manual-section-title"><span className="icon">🕹️</span>{t.sec2}</div>
                <ol className="manual-ol">
                    <li dangerouslySetInnerHTML={{__html: t.how1}}/>
                    <li dangerouslySetInnerHTML={{__html: t.how2}}/>
                    <li dangerouslySetInnerHTML={{__html: t.how3}}/>
                    <li dangerouslySetInnerHTML={{__html: t.how4}}/>
                    <li dangerouslySetInnerHTML={{__html: t.how5}}/>
                </ol>
            </div>

            {/* Rules */}
            <div className="manual-section">
                <div className="manual-section-title"><span className="icon">📋</span>{t.sec3}</div>
                {[t.rule1, t.rule2, t.rule3, t.rule4].map((r,i) => (
                    <p key={i} className="manual-p" style={{paddingLeft:'0.5rem',borderLeft:'3px solid #eee',marginBottom:'0.6rem'}}
                        dangerouslySetInnerHTML={{__html:'• '+r}}/>
                ))}
            </div>

            {/* Strategies */}
            <div className="manual-section">
                <div className="manual-section-title"><span className="icon">♟️</span>{t.sec4}</div>
                {[
                    {title:t.tip1t, body:t.tip1},
                    {title:t.tip2t, body:t.tip2},
                    {title:t.tip3t, body:t.tip3},
                    {title:t.tip4t, body:t.tip4},
                    {title:t.tip5t, body:t.tip5},
                ].map((tip,i) => (
                    <div key={i} className="tip-card">
                        <strong>💡 {tip.title}</strong>
                        <p>{tip.body}</p>
                    </div>
                ))}
            </div>

            {/* AI levels */}
            <div className="manual-section">
                <div className="manual-section-title"><span className="icon">🤖</span>{t.sec5}</div>
                <div className="diff-row">
                    <div className="diff-pill easy">
                        <div className="diff-pill-title">😊 {t.diff_easy_t}</div>
                        <p>{t.diff_easy}</p>
                    </div>
                    <div className="diff-pill medium">
                        <div className="diff-pill-title">🧠 {t.diff_med_t}</div>
                        <p>{t.diff_med}</p>
                    </div>
                    <div className="diff-pill hard">
                        <div className="diff-pill-title">🔥 {t.diff_hard_t}</div>
                        <p>{t.diff_hard}</p>
                    </div>
                </div>
            </div>

            <button className="start-button" onClick={() => setTab('game')}>
                {lang==='fr'?'🎮 Jouer maintenant':'🎮 Play now'}
            </button>
        </div>
    );

    return (
        <div className="app-container">
            <div className="language-toggle">
                <button className={`lang-button ${lang==='fr'?'active':''}`} onClick={() => setLang('fr')}>FR</button>
                <button className={`lang-button ${lang==='en'?'active':''}`} onClick={() => setLang('en')}>EN</button>
            </div>
            <div className="header">
                <h1 className="logo">{t.title}</h1>
                <p className="tagline">{t.tagline}</p>
                <div className="top-tabs">
                    <button className={`top-tab ${tab==='game'?'active':''}`} onClick={() => setTab('game')}>{t.tabGame}</button>
                    <button className={`top-tab ${tab==='manual'?'active':''}`} onClick={() => setTab('manual')}>{t.tabManual}</button>
                </div>
            </div>

            {tab === 'manual' && renderManual()}

            {tab === 'game' && gameState === 'setup'    && renderSetup()}
            {tab === 'game' && gameState === 'playing'  && renderGame()}
            {tab === 'game' && gameState === 'finished' && renderWinner()}
        </div>
    );
};

ReactDOM.render(<SquareGame />, document.getElementById('root'));
</script>

<script>
document.addEventListener('touchstart', function(e){ if(e.touches.length>1)e.preventDefault(); }, {passive:false});
let lastTap=0;
document.addEventListener('touchend', function(e){ const now=Date.now(); if(now-lastTap<300)e.preventDefault(); lastTap=now; }, {passive:false});
document.addEventListener('wheel', function(e){ if(e.ctrlKey)e.preventDefault(); }, {passive:false});
document.addEventListener('keydown', function(e){ if((e.ctrlKey||e.metaKey)&&(e.key==='+'||e.key==='-'||e.key==='='))e.preventDefault(); });
</script>
</body>
</html>
