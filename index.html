<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SQUARE — Multijoueur en ligne</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --c1: #FF6B35; --c2: #004E89; --c3: #FFD23F; --c4: #06D6A0; --c5: #EF476F;
            --dark: #0D0D1A; --mid: #1A1A30; --card: #22223A; --border: rgba(255,255,255,0.08);
            --text: #F0F0FF; --muted: rgba(240,240,255,0.45); --radius: 16px; --shadow: 0 8px 32px rgba(0,0,0,0.45);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html, body { height:100%; overscroll-behavior:none; }
        body { font-family:'Outfit',sans-serif; background:var(--dark); color:var(--text); min-height:100vh; overflow-x:hidden; user-select:none; -webkit-user-select:none; }
        body::before { content:''; position:fixed; inset:0; z-index:0; background-image:linear-gradient(rgba(255,107,53,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,107,53,0.04) 1px,transparent 1px); background-size:48px 48px; pointer-events:none; }
        body::after { content:''; position:fixed; inset:0; z-index:0; background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(255,107,53,0.12),transparent); pointer-events:none; }
        .app { position:relative; z-index:1; min-height:100vh; }
        .header { text-align:center; padding:2.5rem 1rem 1.5rem; border-bottom:1px solid var(--border); }
        .logo { font-size:clamp(2.8rem,8vw,5.5rem); font-weight:900; letter-spacing:-0.03em; background:linear-gradient(135deg,var(--c3) 0%,var(--c1) 60%,var(--c5) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1; }
        .logo-sub { color:var(--muted); font-size:clamp(0.8rem,2vw,1rem); margin-top:0.4rem; letter-spacing:0.12em; text-transform:uppercase; font-weight:400; }
        .lang-bar { position:fixed; top:1rem; right:1rem; z-index:200; display:flex; gap:4px; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:4px; }
        .lang-btn { padding:0.35rem 0.75rem; border:none; background:transparent; border-radius:8px; cursor:pointer; font-family:'Outfit',sans-serif; font-weight:600; font-size:0.85rem; color:var(--muted); transition:all 0.2s; }
        .lang-btn.active { background:var(--c1); color:white; }
        .top-tabs { display:flex; gap:4px; justify-content:center; margin:1.5rem auto 0; background:rgba(255,255,255,0.05); border-radius:12px; padding:4px; max-width:420px; border:1px solid var(--border); }
        .top-tab { flex:1; padding:0.65rem 1rem; border:none; background:transparent; border-radius:9px; cursor:pointer; font-family:'Outfit',sans-serif; font-weight:600; font-size:0.95rem; color:var(--muted); transition:all 0.25s; }
        .top-tab.active { background:var(--c1); color:white; box-shadow:0 2px 12px rgba(255,107,53,0.4); }
        .main { max-width:1400px; margin:0 auto; padding:2rem 1.5rem; }
        .card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:2rem; box-shadow:var(--shadow); animation:fadeUp 0.5s ease-out backwards; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        .card-title { font-size:1.4rem; font-weight:700; margin-bottom:1.5rem; display:flex; align-items:center; gap:0.6rem; }
        .card-title .tag { font-size:0.75rem; background:var(--c1); color:white; padding:0.2rem 0.6rem; border-radius:6px; font-weight:700; }
        .setup-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; max-width:900px; margin:0 auto; }
        @media(max-width:700px){ .setup-grid{ grid-template-columns:1fr; } }
        .section-label { font-size:0.85rem; font-weight:700; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:0.8rem; }
        .btn-group { display:flex; flex-wrap:wrap; gap:0.5rem; }
        .opt-btn { flex:1; min-width:90px; padding:0.7rem 1rem; border:1px solid var(--border); background:rgba(255,255,255,0.04); border-radius:10px; cursor:pointer; font-family:'Outfit',sans-serif; font-size:0.9rem; font-weight:600; color:var(--text); transition:all 0.2s; }
        .opt-btn:hover { background:rgba(255,255,255,0.09); }
        .opt-btn.selected { border-color:var(--c1); background:rgba(255,107,53,0.2); color:var(--c1); }
        .diff-row { display:grid; grid-template-columns:repeat(3,1fr); gap:0.75rem; }
        @media(max-width:500px){ .diff-row{ grid-template-columns:1fr; } }
        .diff-card { padding:1rem; border:1px solid var(--border); background:rgba(255,255,255,0.03); border-radius:12px; cursor:pointer; transition:all 0.2s; }
        .diff-card:hover { background:rgba(255,255,255,0.07); }
        .diff-card.selected.easy { border-color:#06D6A0; background:rgba(6,214,160,0.1); }
        .diff-card.selected.medium { border-color:#FFB800; background:rgba(255,184,0,0.1); }
        .diff-card.selected.hard { border-color:#EF476F; background:rgba(239,71,111,0.1); }
        .diff-card .emoji { font-size:1.6rem; margin-bottom:0.3rem; }
        .diff-card .name { font-weight:700; font-size:0.9rem; }
        .diff-card .desc { font-size:0.75rem; color:var(--muted); margin-top:0.3rem; line-height:1.4; }
        .color-picker { display:flex; gap:0.5rem; flex-wrap:wrap; }
        .color-dot { width:36px; height:36px; border-radius:50%; border:3px solid transparent; cursor:pointer; transition:all 0.2s; }
        .color-dot:hover { transform:scale(1.1); }
        .color-dot.selected { border-color:white; box-shadow:0 0 0 2px rgba(255,255,255,0.5); transform:scale(1.15); }
        .color-dot.taken { opacity:0.2; cursor:not-allowed; }
        .player-row { display:flex; align-items:center; gap:1rem; padding:0.9rem 1rem; background:rgba(255,255,255,0.04); border-radius:12px; margin-bottom:0.6rem; border:1px solid var(--border); }
        .player-dot { width:28px; height:28px; border-radius:50%; flex-shrink:0; border:2px solid rgba(255,255,255,0.3); }
        .player-row-info { flex:1; }
        .player-row-name { font-weight:600; font-size:0.95rem; }
        .primary-btn { width:100%; padding:1.2rem; background:linear-gradient(135deg,var(--c1),#FF8C61); color:white; border:none; border-radius:12px; font-family:'Outfit',sans-serif; font-size:1.1rem; font-weight:700; cursor:pointer; transition:all 0.3s; box-shadow:0 6px 20px rgba(255,107,53,0.35); margin-top:1rem; }
        .primary-btn:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(255,107,53,0.5); }
        .primary-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }

        /* ── ONLINE ── */
        .online-section { max-width:900px; margin:0 auto; }
        .lobby-actions { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1.5rem; }
        @media(max-width:600px){ .lobby-actions{ grid-template-columns:1fr; } }
        .action-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:1.8rem; cursor:pointer; transition:all 0.25s; text-align:center; }
        .action-card:hover { border-color:var(--c1); background:rgba(255,107,53,0.07); transform:translateY(-3px); box-shadow:0 8px 24px rgba(255,107,53,0.2); }
        .action-card .ac-icon { font-size:2.5rem; margin-bottom:0.8rem; }
        .action-card .ac-title { font-size:1.1rem; font-weight:700; margin-bottom:0.4rem; }
        .action-card .ac-desc { font-size:0.83rem; color:var(--muted); line-height:1.5; }
        .join-row { display:flex; gap:0.75rem; margin-top:1rem; }
        .join-input { flex:1; padding:0.9rem 1.2rem; background:rgba(255,255,255,0.07); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:'DM Mono',monospace; font-size:1.2rem; letter-spacing:0.2em; text-align:center; outline:none; text-transform:uppercase; transition:border-color 0.2s; }
        .join-input:focus { border-color:var(--c3); }
        .join-input::placeholder { font-size:0.85rem; letter-spacing:0.05em; color:var(--muted); }
        .room-header { display:flex; align-items:center; gap:1rem; flex-wrap:wrap; margin-bottom:1.5rem; padding-bottom:1.2rem; border-bottom:1px solid var(--border); }
        .room-code-badge { background:rgba(255,210,63,0.15); border:1px solid rgba(255,210,63,0.4); border-radius:10px; padding:0.5rem 1.2rem; font-family:'DM Mono',monospace; font-size:1.5rem; font-weight:700; color:var(--c3); letter-spacing:0.2em; }
        .room-status-badge { padding:0.4rem 0.9rem; border-radius:8px; font-size:0.8rem; font-weight:700; letter-spacing:0.06em; }
        .status-waiting { background:rgba(6,214,160,0.15); color:#06D6A0; border:1px solid rgba(6,214,160,0.3); }
        .status-playing { background:rgba(255,107,53,0.15); color:var(--c1); border:1px solid rgba(255,107,53,0.3); }
        .room-players { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:0.75rem; margin-bottom:1.5rem; }
        .room-player-card { background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:12px; padding:1rem 1.2rem; display:flex; align-items:center; gap:0.8rem; transition:all 0.3s; }
        .room-player-card.me { border-color:var(--c3); background:rgba(255,210,63,0.07); }
        .room-player-card.host-card { border-color:var(--c1); }
        .room-player-avatar { width:40px; height:40px; border-radius:50%; flex-shrink:0; border:2px solid rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; font-size:1.1rem; }
        .room-player-name { font-weight:700; font-size:0.95rem; }
        .room-player-badge { font-size:0.7rem; color:var(--muted); margin-top:2px; }
        .empty-slot { opacity:0.35; border-style:dashed; }
        .chat-box { background:rgba(0,0,0,0.25); border:1px solid var(--border); border-radius:12px; overflow:hidden; height:200px; display:flex; flex-direction:column; }
        .chat-messages { flex:1; overflow-y:auto; padding:0.8rem 1rem; display:flex; flex-direction:column; gap:0.3rem; }
        .chat-messages::-webkit-scrollbar { width:4px; }
        .chat-messages::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:2px; }
        .chat-msg { font-size:0.83rem; line-height:1.4; color:var(--muted); }
        .chat-msg .sender { font-weight:700; }
        .chat-msg.system { color:rgba(255,210,63,0.7); font-style:italic; }
        .chat-input-row { display:flex; border-top:1px solid var(--border); }
        .chat-input { flex:1; padding:0.65rem 1rem; background:transparent; border:none; color:var(--text); font-family:'Outfit',sans-serif; font-size:0.85rem; outline:none; }
        .chat-input::placeholder { color:var(--muted); }
        .chat-send { padding:0.65rem 1rem; background:transparent; border:none; border-left:1px solid var(--border); color:var(--c1); cursor:pointer; font-size:1.1rem; transition:background 0.2s; }
        .chat-send:hover { background:rgba(255,107,53,0.15); }

        /* ── GAME ── */
        .game-screen { display:flex; flex-direction:column; gap:1.2rem; }
        .game-topbar { display:flex; flex-wrap:wrap; gap:1rem; justify-content:space-between; align-items:center; background:var(--card); border:1px solid var(--border); padding:1rem 1.5rem; border-radius:14px; }
        .turn-info { display:flex; align-items:center; gap:0.75rem; }
        .turn-dot { width:22px; height:22px; border-radius:50%; border:2.5px solid rgba(255,255,255,0.3); animation:pulse 2s infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
        .turn-name { font-weight:700; font-size:1.05rem; }
        .turn-you { font-size:0.78rem; color:var(--c4); font-weight:700; background:rgba(6,214,160,0.15); border:1px solid rgba(6,214,160,0.3); padding:0.1rem 0.5rem; border-radius:5px; }
        .thinking-dot { display:inline-block; animation:thinkBlink 1s infinite; }
        .thinking-dot:nth-child(2){animation-delay:0.2s;} .thinking-dot:nth-child(3){animation-delay:0.4s;}
        @keyframes thinkBlink{0%,80%,100%{opacity:0.2}40%{opacity:1}}
        .ctrl-btns { display:flex; gap:0.6rem; }
        .ctrl-btn { padding:0.6rem 1.1rem; border:none; border-radius:9px; font-family:'Outfit',sans-serif; font-weight:600; cursor:pointer; transition:all 0.2s; font-size:0.88rem; }
        .ctrl-btn.green { background:rgba(6,214,160,0.2); color:#06D6A0; border:1px solid rgba(6,214,160,0.4); }
        .ctrl-btn.red { background:rgba(239,71,111,0.2); color:#EF476F; border:1px solid rgba(239,71,111,0.4); }
        .ctrl-btn.blue { background:rgba(0,78,137,0.3); color:#4DB8FF; border:1px solid rgba(77,184,255,0.4); }
        .ctrl-btn:hover { transform:translateY(-1px); filter:brightness(1.2); }
        .game-layout { display:grid; grid-template-columns:1fr 280px; gap:1.2rem; align-items:start; }
        @media(max-width:900px){ .game-layout{ grid-template-columns:1fr; } }
        .board-wrap { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:1.5rem; display:flex; justify-content:center; overflow:auto; }
        .sidebar { display:flex; flex-direction:column; gap:1rem; }
        .scoreboard-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:1.2rem; }
        .score-title { font-size:0.8rem; font-weight:700; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:1rem; }
        .score-item { display:flex; justify-content:space-between; align-items:center; padding:0.7rem 0.9rem; border-radius:10px; margin-bottom:0.5rem; transition:all 0.3s; background:rgba(255,255,255,0.03); }
        .score-item.active { background:rgba(255,210,63,0.12); border:1px solid rgba(255,210,63,0.3); }
        .score-item.you { border:1px solid rgba(255,255,255,0.12); }
        .score-left { display:flex; align-items:center; gap:0.7rem; }
        .score-dot { width:16px; height:16px; border-radius:50%; border:2px solid rgba(255,255,255,0.2); flex-shrink:0; }
        .score-name { font-weight:600; font-size:0.9rem; }
        .score-val { font-family:'DM Mono',monospace; font-size:1.25rem; font-weight:700; color:var(--c1); }
        .online-badge { display:inline-block; width:8px; height:8px; border-radius:50%; background:#06D6A0; box-shadow:0 0 6px rgba(6,214,160,0.7); margin-left:4px; }
        .offline-badge { display:inline-block; width:8px; height:8px; border-radius:50%; background:#666; margin-left:4px; }
        .winner-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:1000; display:flex; justify-content:center; align-items:center; animation:fadeIn 0.5s ease-out; }
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .winner-box { background:var(--card); border:1px solid var(--border); border-radius:24px; padding:2.5rem; max-width:440px; width:90%; text-align:center; animation:scaleIn 0.5s ease-out; }
        @keyframes scaleIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
        .winner-emoji { font-size:4rem; margin-bottom:1rem; }
        .winner-title { font-size:2.5rem; font-weight:900; background:linear-gradient(135deg,var(--c3),var(--c1)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:0.5rem; }
        .winner-name { font-size:1.5rem; font-weight:700; margin-bottom:1.5rem; }
        .final-list { margin-bottom:1.5rem; }
        .final-row { display:flex; justify-content:space-between; align-items:center; padding:0.6rem 0.8rem; background:rgba(255,255,255,0.05); border-radius:8px; margin-bottom:0.4rem; }
        .final-row .fr-name { display:flex; align-items:center; gap:0.6rem; font-weight:600; font-size:0.92rem; }
        .final-row .fr-score { font-family:'DM Mono',monospace; font-weight:700; color:var(--c1); }
        .manual-wrap { max-width:800px; margin:0 auto; }
        .manual-section-title { font-size:1rem; font-weight:700; color:var(--c3); margin:1.5rem 0 0.8rem; display:flex; align-items:center; gap:0.5rem; }
        .manual-p { color:var(--muted); line-height:1.7; font-size:0.93rem; margin-bottom:0.6rem; }
        .manual-ol { padding-left:1.3rem; color:var(--muted); line-height:1.8; font-size:0.93rem; }
        .tip-card { background:rgba(0,78,137,0.2); border-left:3px solid var(--c2); border-radius:10px; padding:0.9rem 1.1rem; margin-bottom:0.7rem; }
        .tip-card strong { color:#4DB8FF; }
        .tip-card p { color:var(--muted); font-size:0.88rem; line-height:1.6; margin-top:0.25rem; }
        .diff-pills { display:grid; grid-template-columns:repeat(3,1fr); gap:0.75rem; }
        @media(max-width:500px){.diff-pills{grid-template-columns:1fr;}}
        .diff-pill-card { border-radius:12px; padding:1rem; }
        .diff-pill-card.easy { background:rgba(6,214,160,0.1); border:1px solid rgba(6,214,160,0.2); }
        .diff-pill-card.medium { background:rgba(255,184,0,0.1); border:1px solid rgba(255,184,0,0.2); }
        .diff-pill-card.hard { background:rgba(239,71,111,0.1); border:1px solid rgba(239,71,111,0.2); }
        .diff-pill-card .dpt { font-weight:700; font-size:0.9rem; margin-bottom:0.3rem; }
        .diff-pill-card p { font-size:0.8rem; color:var(--muted); line-height:1.5; }
        .notif { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%); z-index:500; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:0.75rem 1.5rem; font-weight:600; font-size:0.9rem; box-shadow:0 8px 24px rgba(0,0,0,0.5); animation:slideUp 0.3s ease-out; white-space:nowrap; }
        @keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        .notif.success { border-color:rgba(6,214,160,0.5); color:#06D6A0; }
        .notif.error { border-color:rgba(239,71,111,0.5); color:#EF476F; }
        .notif.info { border-color:rgba(255,210,63,0.5); color:var(--c3); }
        .fb-status-bar { display:flex; align-items:center; gap:0.6rem; padding:0.6rem 1rem; border-radius:10px; margin-bottom:1.5rem; font-size:0.85rem; font-weight:600; }
        .fb-status-bar.connected { background:rgba(6,214,160,0.12); border:1px solid rgba(6,214,160,0.3); color:#06D6A0; }
        .fb-status-bar.disconnected { background:rgba(239,71,111,0.12); border:1px solid rgba(239,71,111,0.3); color:#EF476F; }
        .spinner { width:18px; height:18px; border:2px solid rgba(255,255,255,0.2); border-top-color:var(--c1); border-radius:50%; animation:spin 0.7s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        @media(max-width:768px){ .main{padding:1.5rem 1rem;} }
        input[type=text]:focus { outline:none; }
        @keyframes squareAppear{0%{opacity:0;transform:scale(0.5)}60%{transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
    </style>
</head>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const T = {
    fr:{
        title:"SQUARE", tagline:"Multijoueur en ligne • Jusqu'à 4 joueurs",

const COLORS = { blue:'#2196F3', red:'#F44336', yellow:'#FFC107', green:'#4CAF50', purple:'#9C27B0', orange:'#FF9800' };
const COLOR_KEYS = Object.keys(COLORS);

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function detectSquares(dots, rows, cols, existingSquares) {
    const formed = [];
    for (let r=0; r<rows; r++) for (let c=0; c<cols; c++) {
        if (existingSquares.some(s=>s.row===r&&s.col===c)) continue;
        const tl=dots[`${r}-${c}`], tr=dots[`${r}-${c+1}`], bl=dots[`${r+1}-${c}`], br=dots[`${r+1}-${c+1}`];
        if (tl && tl===tr && tl===bl && tl===br) formed.push({row:r, col:c, color:tl});
    }
    return formed;
}

// ─── AI ───────────────────────────────────────────────────────────────────────
function getAvail(dots,rows,cols){const a=[];for(let r=0;r<=rows;r++)for(let c=0;c<=cols;c++)if(!dots[`${r}-${c}`])a.push({row:r,col:c});return a;}
function immGain(dots,row,col,color,rows,cols,sq){const t={...dots,[`${row}-${col}`]:color};return detectSquares(t,rows,cols,sq).filter(s=>s.color===color).length;}
function oppGain(dots,row,col,oc,rows,cols,sq){const t={...dots,[`${row}-${col}`]:oc};return detectSquares(t,rows,cols,sq).filter(s=>s.color===oc).length;}
function cellCC(dots,r,c,color){const corners=[dots[`${r}-${c}`],dots[`${r}-${c+1}`],dots[`${r+1}-${c}`],dots[`${r+1}-${c+1}`]];return{mine:corners.filter(x=>x===color).length,other:corners.filter(x=>x&&x!==color).length};}
function aiPickMove(dots,rows,cols,existingSquares,aiColor,allColors,difficulty){
    const av=getAvail(dots,rows,cols);if(!av.length)return null;
    if(difficulty==='easy')return av[Math.floor(Math.random()*av.length)];
    const oppColors=allColors.filter(c=>c!==aiColor);
    if(difficulty==='medium'){
        const scored=av.map(d=>{
            const g=immGain(dots,d.row,d.col,aiColor,rows,cols,existingSquares)*1000;
            let b=0;for(const oc of oppColors)b+=oppGain(dots,d.row,d.col,oc,rows,cols,existingSquares)*500;
            const td={...dots,[`${d.row}-${d.col}`]:aiColor};let s=0;
            for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){const{mine,other}=cellCC(td,r,c,aiColor);if(!other){if(mine===3)s+=80;else if(mine===2)s+=20;}}
            return{...d,score:g+b+s};
        });
        scored.sort((a,b)=>b.score-a.score);const best=scored[0].score;
        if(best===0)return scored[Math.floor(Math.random()*Math.ceil(scored.length*0.4))];
        const tied=scored.filter(d=>d.score>=best*0.9);return tied[Math.floor(Math.random()*Math.min(tied.length,3))];
    }
    const wins=av.map(d=>({...d,g:immGain(dots,d.row,d.col,aiColor,rows,cols,existingSquares)})).filter(d=>d.g>0);
    if(wins.length){wins.sort((a,b)=>b.g-a.g);return wins[0];}
    const blocks=[];for(const oc of oppColors)for(const d of av){const g=oppGain(dots,d.row,d.col,oc,rows,cols,existingSquares);if(g>0)blocks.push({...d,g});}
    if(blocks.length){blocks.sort((a,b)=>b.g-a.g);return blocks[0];}
    const strat=av.map(d=>{
        const td={...dots,[`${d.row}-${d.col}`]:aiColor};let sc=0;
        for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){const{mine,other}=cellCC(td,r,c,aiColor);if(!other){if(mine===3)sc+=120;else if(mine===2)sc+=30;}for(const oc of oppColors){const op=cellCC(td,r,c,oc);if(!op.other){if(op.mine===3)sc-=110;else if(op.mine===2)sc-=25;}}}
        return{...d,sc};
    });
    strat.sort((a,b)=>b.sc-a.sc);return strat[0]||av[Math.floor(Math.random()*av.length)];
}

// MAIN APP
// ═══════════════════════════════════════════════════════════════════════════════
const App = () => {
    const [lang, setLang]   = useState('fr');
    const t = T[lang];
    const [tab, setTab]     = useState('play');
    const [notif, setNotif] = useState(null);

    // Local game
    const [gameState, setGameState] = useState('setup');
    const [numPlayers, setNumPlayers] = useState(2);
    const [vsAI, setVsAI]   = useState(false);
    const [aiDiff, setAiDiff] = useState('medium');
    const [gridSize, setGridSize] = useState({rows:8,cols:8});
    const [players, setPlayers] = useState([
        {id:1,name:'Joueur 1',color:'blue',isAI:false,score:0},
        {id:2,name:'Joueur 2',color:'red',isAI:false,score:0}
    ]);
    const [curIdx, setCurIdx] = useState(0);
    const [dots, setDots]     = useState({});
    const [squares, setSquares] = useState([]);
    const [aiThinking, setAiThinking] = useState(false);

    // Online
    const [myId]    = useState(() => genUserId());
    const [myName, setMyName]   = useState('');
    const [myColor, setMyColor] = useState('blue');
    const [onlineMode, setOnlineMode] = useState('lobby');
    const [room, setRoom]       = useState(null);
    const [joinCode, setJoinCode] = useState('');
    const [chatMessages, setChatMessages] = useState([]);
    const [chatInput, setChatInput] = useState('');
    const [isLoading, setIsLoading] = useState(false);
    const chatEndRef = useRef(null);
    const roomListenerRef = useRef(null);
    const chatListenerRef = useRef(null);
    const stateRef = useRef({});

    useEffect(() => {
        stateRef.current = {dots,squares,players,curIdx,gameState,gridSize,aiDiff};
    });

    const showNotif = (msg, type='info', dur=3000) => {
        setNotif({msg,type});
        setTimeout(() => setNotif(null), dur);
    };

    // Init local players
    useEffect(() => {
        if (gameState !== 'setup') return;
        const next = [];
        for (let i=0; i<numPlayers; i++) {
            next.push({id:i+1, name:`${t.player} ${i+1}`, color:COLOR_KEYS[i%COLOR_KEYS.length], isAI:vsAI&&i>0, score:0});
        }
        setPlayers(next);
    }, [numPlayers, vsAI, lang, gameState]);

    // ── LOCAL GAME ────────────────────────────────────────────────────────────
    const applyMove = useCallback((row,col,_dots,_sq,_pl,_ci,_gs) => {
        if (stateRef.current.gameState !== 'playing') return;
        if (_dots[`${row}-${col}`]) return;
        const player = _pl[_ci];
        const newDots = {..._dots, [`${row}-${col}`]:player.color};
        const formed  = detectSquares(newDots, _gs.rows, _gs.cols, _sq);
        const mine    = formed.filter(s=>s.color===player.color);
        let newSq=_sq, newPl=_pl;
        if (mine.length > 0) {
            const base = _sq.filter(s=>s.color===player.color).length;
            const numbered = mine.map((sq,i)=>({...sq, number:base+i+1}));
            newSq = [..._sq, ...numbered];
            newPl = _pl.map((p,i)=>i===_ci?{...p,score:p.score+mine.length}:p);
        }
        const nextIdx = (_ci+1) % _pl.length;
        const total = (_gs.rows+1)*(_gs.cols+1);
        const done  = Object.keys(newDots).length >= total;
        setDots(newDots); setSquares(newSq); setPlayers(newPl); setCurIdx(nextIdx);
        if (done) { setTimeout(()=>setGameState('finished'),400); return; }
        if (_pl[nextIdx].isAI) {
            setAiThinking(true);
            const delay = stateRef.current.aiDiff==='hard'?800:stateRef.current.aiDiff==='medium'?500:300;
            setTimeout(()=>{
                const s = stateRef.current;
                if (s.gameState !== 'playing') { setAiThinking(false); return; }
                const allColors = s.players.map(p=>p.color);
                const move = aiPickMove(newDots,s.gridSize.rows,s.gridSize.cols,newSq,s.players[nextIdx].color,allColors,s.aiDiff);
                setAiThinking(false);
                if (move) applyMove(move.row,move.col,newDots,newSq,newPl,nextIdx,s.gridSize);
            }, delay);
        }
    },[]);

    const handleDotClick = (row,col) => {
        const {dots:d,squares:sq,players:pl,curIdx:ci,gridSize:gs} = stateRef.current;
        if (pl[ci].isAI || aiThinking) return;
        applyMove(row,col,d,sq,pl,ci,gs);
    };

    const startLocal = () => {
        const r = players.map(p=>({...p,score:0}));
        setPlayers(r); setDots({}); setSquares([]); setCurIdx(0); setAiThinking(false);
        setGameState('playing');
        if (r[0].isAI) {
            setAiThinking(true);
            setTimeout(()=>{
                const allColors = r.map(p=>p.color);
                const move = aiPickMove({},gridSize.rows,gridSize.cols,[],r[0].color,allColors,aiDiff);
                setAiThinking(false);
                if (move) applyMove(move.row,move.col,{},[],r,0,gridSize);
            },600);
        }
    };

    const newLocalGame = () => { setGameState('setup'); setDots({}); setSquares([]); setCurIdx(0); setAiThinking(false); };
    const updateColor  = (id,color) => {
        if (players.some(p=>p.id!==id&&p.color===color)) return;
        setPlayers(players.map(p=>p.id===id?{...p,color}:p));
    };

    // ─── FIREBASE ROOM LISTENER ───────────────────────────────────────────────
    const attachRoomListener = useCallback((code) => {
        if (roomListenerRef.current) roomListenerRef.current.off();
        if (chatListenerRef.current) chatListenerRef.current.off();

        const ref = db.ref(`rooms/${code}`);
        roomListenerRef.current = ref;
        ref.on('value', snap => {
            const data = snap.val();
            if (!data) {
                setOnlineMode('lobby');
                setRoom(null);
                return;
            }
            setRoom(data);
            if (data.gameStarted && !data.gameFinished) {
                setOnlineMode('game');
            }
        });

        const chatRef = db.ref(`rooms/${code}/chat`);
        chatListenerRef.current = chatRef;
        chatRef.on('value', snap => {
            const msgs = [];
            snap.forEach(child => msgs.push(child.val()));
            setChatMessages(msgs);
        });

        // On disconnect: mark offline
        db.ref(`rooms/${code}/players/${myId}/online`).onDisconnect().set(false);
    }, [myId]);

    const detachListeners = useCallback(() => {
        if (roomListenerRef.current) { roomListenerRef.current.off(); roomListenerRef.current = null; }
        if (chatListenerRef.current) { chatListenerRef.current.off(); chatListenerRef.current = null; }
    }, []);

    // Auto scroll chat
    useEffect(() => { chatEndRef.current?.scrollIntoView({behavior:'smooth'}); }, [chatMessages]);

    // ─── CREATE ROOM ──────────────────────────────────────────────────────────
    const createRoom = async () => {
        if (!myName.trim()) { showNotif(t.needName, 'error'); return; }
        setIsLoading(true);
        try {
            const code = genRoomCode();
            const hostPlayer = { id:myId, name:myName.trim(), color:myColor, isHost:true, online:true, score:0, idx:0 };
            const roomData = {
                code, createdAt:Date.now(), hostId:myId,
                gameStarted:false, gameFinished:false,
                gridRows:8, gridCols:8,
                currentPlayerIdx:0, currentPlayerId:myId,
                players:{ [myId]: hostPlayer }
            };
            await db.ref(`rooms/${code}`).set(roomData);
            setRoom(roomData);
            attachRoomListener(code);
            setOnlineMode('room');
            showNotif(`Salle créée : ${code}`, 'success');
        } catch(e) {
            showNotif('Erreur création salle', 'error');
            console.error(e);
        }
        setIsLoading(false);
    };

    // ─── JOIN ROOM ────────────────────────────────────────────────────────────
    const joinRoom = async () => {
        if (!myName.trim()) { showNotif(t.needName, 'error'); return; }
        const code = joinCode.trim().toUpperCase();
        if (code.length !== 6) { showNotif(t.codeInvalid, 'error'); return; }
        setIsLoading(true);
        try {
            const snap = await db.ref(`rooms/${code}`).get();
            if (!snap.exists()) { showNotif(t.roomNotFound, 'error'); setIsLoading(false); return; }
            const data = snap.val();
            const existing = Object.values(data.players || {});
            if (existing.length >= 4) { showNotif(t.roomFull, 'error'); setIsLoading(false); return; }
            if (data.gameStarted) { showNotif(t.gameAlreadyStarted, 'error'); setIsLoading(false); return; }
            const usedColors = existing.map(p=>p.color);
            const freeColor  = COLOR_KEYS.find(c=>!usedColors.includes(c)) || myColor;
            const mePlayer = { id:myId, name:myName.trim(), color:freeColor, isHost:false, online:true, score:0, idx:existing.length };
            await db.ref(`rooms/${code}/players/${myId}`).set(mePlayer);
            await db.ref(`rooms/${code}/chat`).push({ sender:'', text:`${myName.trim()} a rejoint la salle`, ts:Date.now(), type:'system' });
            setMyColor(freeColor);
            attachRoomListener(code);
            setOnlineMode('room');
        } catch(e) {
            showNotif('Erreur connexion salle', 'error');
            console.error(e);
        }
        setIsLoading(false);
    };

    // ─── LEAVE ROOM ───────────────────────────────────────────────────────────
    const leaveRoom = async () => {
        if (room) {
            try {
                await db.ref(`rooms/${room.code}/players/${myId}/online`).set(false);
                await db.ref(`rooms/${room.code}/chat`).push({ sender:'', text:`${myName} a quitté la salle`, ts:Date.now(), type:'system' });
                // If host, remove room after short delay
                if (room.hostId === myId) {
                    setTimeout(async () => {
                        await db.ref(`rooms/${room.code}`).remove();
                    }, 3000);
                }
            } catch(e) { console.error(e); }
        }
        detachListeners();
        setRoom(null);
        setOnlineMode('lobby');
        setChatMessages([]);
    };

    // ─── START ONLINE GAME ────────────────────────────────────────────────────
    const startOnlineGame = async () => {
        if (!room) return;
        const playerList = Object.values(room.players||{}).filter(p=>p.online);
        if (playerList.length < 2) { showNotif(t.need2players, 'error'); return; }
        try {
            // Reset scores
            const updates = {};
            playerList.forEach(p => { updates[`players/${p.id}/score`] = 0; });
            updates.gameStarted = true;
            updates.gameFinished = false;
            updates.currentPlayerIdx = 0;
            updates.currentPlayerId = playerList.sort((a,b)=>a.idx-b.idx)[0].id;
            // Clear dots/squares
            updates.dots = null;
            updates.squares = null;
            await db.ref(`rooms/${room.code}`).update(updates);
            await db.ref(`rooms/${room.code}/chat`).push({ sender:'', text:'La partie commence !', ts:Date.now(), type:'system' });
        } catch(e) {
            showNotif('Erreur démarrage', 'error');
            console.error(e);
        }
    };

    // ─── ONLINE DOT CLICK ─────────────────────────────────────────────────────
    const onlineDotClick = async (row, col) => {
        if (!room || !db) return;
        const r = room;
        const playerList = Object.values(r.players||{}).filter(p=>p.online).sort((a,b)=>a.idx-b.idx);
        if (!playerList.length) return;
        const curPlayer = playerList[r.currentPlayerIdx % playerList.length];
        if (!curPlayer || curPlayer.id !== myId) return;
        const dotsData = r.dots || {};
        if (dotsData[`${row}-${col}`]) return;

        const newDots = {...dotsData, [`${row}-${col}`]:curPlayer.color};
        const existingSq = r.squares ? Object.values(r.squares) : [];
        const formed = detectSquares(newDots, r.gridRows||8, r.gridCols||8, existingSq);
        const mine   = formed.filter(s=>s.color===curPlayer.color);

        let newSquares = existingSq;
        let nextIdx = (r.currentPlayerIdx + 1) % playerList.length;
        let newScore = curPlayer.score || 0;

        if (mine.length > 0) {
            const base = existingSq.filter(s=>s.color===curPlayer.color).length;
            const numbered = mine.map((sq,i)=>({...sq, number:base+i+1}));
            newSquares = [...existingSq, ...numbered];
            newScore += mine.length;
            nextIdx = r.currentPlayerIdx % playerList.length; // replay on score
        }

        const total = (r.gridRows+1)*(r.gridCols+1);
        const done  = Object.keys(newDots).length >= total;

        try {
            const updates = {
                dots: newDots,
                squares: newSquares,
                currentPlayerIdx: nextIdx,
                currentPlayerId: playerList[nextIdx % playerList.length].id,
                gameFinished: done,
                [`players/${myId}/score`]: newScore
            };
            await db.ref(`rooms/${r.code}`).update(updates);
            if (done) {
                await db.ref(`rooms/${r.code}/chat`).push({ sender:'', text:'Partie terminée !', ts:Date.now(), type:'system' });
            }
        } catch(e) {
            console.error('Move error:', e);
        }
    };

    // ─── CHAT ─────────────────────────────────────────────────────────────────
    const sendChatMsg = async () => {
        if (!chatInput.trim() || !room || !db) return;
        const msg = { sender:myName.trim(), text:chatInput.trim(), ts:Date.now(), type:'user' };
        setChatInput('');
        try { await db.ref(`rooms/${room.code}/chat`).push(msg); }
        catch(e) { console.error(e); }
    };

    const copyRoomCode = () => {
        if (room) {
            navigator.clipboard?.writeText(room.code).catch(()=>{});
            showNotif(t.codeCopied, 'success', 2000);
        }
    };

    // ═══════════════════════════════════════════════════════════════════════════
    // RENDER BOARD
    // ═══════════════════════════════════════════════════════════════════════════
    const renderBoard = (dotsData, squaresData, rows, cols, onClickFn) => {
        const cellSize = Math.min(52, Math.max(24, Math.floor((Math.min(window.innerWidth*0.75, 700)-60)/(cols+1))));
        const dotR = Math.max(4, Math.floor(cellSize*0.16));
        const w=(cols+1)*cellSize, h=(rows+1)*cellSize;
        const sqArr = squaresData ? (Array.isArray(squaresData) ? squaresData : Object.values(squaresData)) : [];
        return (
            <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{display:'block',maxWidth:'100%',touchAction:'none'}}>
                {Array.from({length:rows},(_,r)=>Array.from({length:cols},(_,c)=>(
                    <rect key={`g${r}-${c}`} x={c*cellSize} y={r*cellSize} width={cellSize} height={cellSize} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="1"/>
                )))}
                {sqArr.map((sq,i)=>(
                    <g key={`sq${i}`}>
                        <rect x={sq.col*cellSize+2} y={sq.row*cellSize+2} width={cellSize-4} height={cellSize-4} rx="4"
                            fill={COLORS[sq.color]} fillOpacity="0.4" stroke={COLORS[sq.color]} strokeWidth="2.5"/>
                        <text x={sq.col*cellSize+cellSize/2} y={sq.row*cellSize+cellSize/2}
                            textAnchor="middle" dominantBaseline="middle"
                            fontSize={Math.max(9,cellSize*0.34)} fontFamily="DM Mono,monospace"
                            fontWeight="700" fill={COLORS[sq.color]} fillOpacity="0.9" pointerEvents="none">
                            {sq.number}
                        </text>
                    </g>
                ))}
                {Array.from({length:rows+1},(_,r)=>Array.from({length:cols+1},(_,c)=>{
                    const key=`${r}-${c}`;
                    const placed=(dotsData||{})[key];
                    return(
                        <g key={`d${r}-${c}`} onClick={()=>!placed&&onClickFn(r,c)} style={{cursor:placed?'default':'pointer'}}>
                            {!placed&&<circle cx={c*cellSize} cy={r*cellSize} r={dotR+6} fill="transparent"/>}
                            <circle cx={c*cellSize} cy={r*cellSize} r={placed?dotR+1:dotR-1}
                                fill={placed?COLORS[placed]:'rgba(255,255,255,0.15)'}
                                stroke={placed?'white':'none'} strokeWidth={placed?2:0}/>
                        </g>
                    );
                }))}
            </svg>
        );
    };

    // ═══════════════════════════════════════════════════════════════════════════
    // RENDER SETUP
    // ═══════════════════════════════════════════════════════════════════════════
    const renderSetup = () => (
        <div className="setup-grid">
            <div className="card">
                <div className="card-title">{t.localSetup}</div>
                <div style={{marginBottom:'1.2rem'}}>
                    <div className="section-label">{t.numPlayers}</div>
                    <div className="btn-group">
                        {[2,3,4].map(n=>(
                            <button key={n} className={`opt-btn ${numPlayers===n?'selected':''}`} onClick={()=>setNumPlayers(n)}>
                                {n} {n>1?t.players:t.player}
                            </button>
                        ))}
                    </div>
                </div>
                <div style={{marginBottom:'1.2rem'}}>
                    <div className="section-label">{t.gameMode}</div>
                    <div className="btn-group">
                        <button className={`opt-btn ${!vsAI?'selected':''}`} onClick={()=>setVsAI(false)}>👥 {t.playersOnly}</button>
                        <button className={`opt-btn ${vsAI?'selected':''}`}   onClick={()=>setVsAI(true)}>🤖 {t.vsAI}</button>
                    </div>
                </div>
                {vsAI&&(
                    <div style={{marginBottom:'1.2rem'}}>
                        <div className="section-label">{t.aiDiff}</div>
                        <div className="diff-row">
                            {[{k:'easy',e:'😊',n:t.easy,d:t.easyDesc,c:'easy'},{k:'medium',e:'🧠',n:t.mediumD,d:t.mediumDesc,c:'medium'},{k:'hard',e:'🔥',n:t.hard,d:t.hardDesc,c:'hard'}].map(({k,e,n,d,c})=>(
                                <div key={k} className={`diff-card ${c} ${aiDiff===k?'selected':''}`} onClick={()=>setAiDiff(k)}>
                                    <div className="emoji">{e}</div><div className="name">{n}</div><div className="desc">{d}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                )}
                <div>
                    <div className="section-label">{t.gridSize}</div>
                    <div className="btn-group">
                        {[{r:5,c:5,l:t.small},{r:8,c:8,l:t.medium},{r:10,c:10,l:t.large},{r:12,c:12,l:t.veryLarge}].map(s=>(
                            <button key={`${s.r}x${s.c}`} className={`opt-btn ${gridSize.rows===s.r?'selected':''}`} onClick={()=>setGridSize({rows:s.r,cols:s.c})}>
                                {s.r}×{s.c} {s.l}
                            </button>
                        ))}
                    </div>
                </div>
            </div>
            <div className="card">
                <div className="card-title">{t.colors}</div>
                {players.map(player=>(
                    <div key={player.id} className="player-row">
                        <div className="player-dot" style={{backgroundColor:COLORS[player.color]}}/>
                        <div className="player-row-info">
                            <div className="player-row-name">{player.isAI?'🤖 ':''}{player.name} {player.isAI&&<span style={{color:'var(--muted)',fontSize:'0.8rem'}}>{t.ai}</span>}</div>
                            <div className="color-picker" style={{marginTop:'0.5rem'}}>
                                {Object.entries(COLORS).map(([name,val])=>{
                                    const taken=players.some(p=>p.id!==player.id&&p.color===name);
                                    return(<div key={name} className={`color-dot ${player.color===name?'selected':''} ${taken?'taken':''}`} style={{backgroundColor:val}} onClick={()=>!taken&&updateColor(player.id,name)}/>);
                                })}
                            </div>
                        </div>
                    </div>
                ))}
                <button className="primary-btn" onClick={startLocal}>{t.start}</button>
            </div>
        </div>
    );

    // ═══════════════════════════════════════════════════════════════════════════
    // RENDER LOCAL GAME
    // ═══════════════════════════════════════════════════════════════════════════
    const renderLocalGame = () => {
        const cur = players[curIdx];
        return(
            <div className="game-screen">
                <div className="game-topbar">
                    <div className="turn-info">
                        <div className="turn-dot" style={{backgroundColor:cur?COLORS[cur.color]:'#999'}}/>
                        <div>
                            <div className="turn-name">{t.turnOf} {cur?.name} {cur?.isAI&&t.ai}</div>
                            {aiThinking&&<div style={{fontSize:'0.8rem',color:'var(--muted)'}}>Réfléchit <span className="thinking-dot">●</span><span className="thinking-dot">●</span><span className="thinking-dot">●</span></div>}
                        </div>
                    </div>
                    <div className="ctrl-btns">

                </div>
                <div className="game-layout">
                    <div className="board-wrap">{renderBoard(dots,squares,gridSize.rows,gridSize.cols,handleDotClick)}</div>
                    <div className="sidebar">
                        <div className="scoreboard-card">
                            <div className="score-title">{t.scoreboard}</div>

                                        <div className="score-dot" style={{backgroundColor:COLORS[p.color]}}/>

                                    </div>

                                </div>

                    </div>

    const renderLocalWinner = () => {
        const sorted=[...players].sort((a,b)=>b.score-a.score);

        const isDraw=sorted.filter(p=>p.score===best.score).length>1;
        return(
            <div className="winner-overlay">
                <div className="winner-box">

    // ═══════════════════════════════════════════════════════════════════════════
    // ONLINE SCREENS
    // ═══════════════════════════════════════════════════════════════════════════
    const renderOnlineLobby = () => (

            <div className="card" style={{marginBottom:'1.5rem'}}>
                <div style={{display:'flex',flexWrap:'wrap',gap:'1.2rem',alignItems:'flex-end'}}>

                        <div className="section-label">{t.yourName}</div>
                        <input className="join-input" style={{width:'100%',letterSpacing:'0.02em',textAlign:'left',fontSize:'1rem'}}
                            placeholder={t.name} value={myName} onChange={e=>setMyName(e.target.value)}

                    </div>
                    <div>
                        <div className="section-label">{t.colors}</div>
                        <div className="color-picker">

                </div>

        const emptySlots = 4 - playerList.length;
        const isHost = room.hostId === myId;

        return(
            <div className="online-section">
                <div className="card">
                    <div className="room-header">
                        <div>
                            <div style={{fontSize:'0.8rem',color:'var(--muted)',marginBottom:'0.3rem'}}>{t.roomCode}</div>
                            <div className="room-code-badge">{room.code}</div>
                        </div>
                        <div className={`room-status-badge ${room.gameStarted?'status-playing':'status-waiting'}`}>
                            {room.gameStarted?t.playing:t.waiting}
                        </div>
                        <button className="ctrl-btn blue" onClick={copyRoomCode}>📋 {t.copyCode}</button>
                        <div style={{marginLeft:'auto'}}>
                            <button className="ctrl-btn red" onClick={leaveRoom}>{t.leaveRoom}</button>
                        </div>
                    </div>

                    <div className="section-label" style={{marginBottom:'0.8rem'}}>{t.players_in_room} ({onlinePlayers.length}/4)</div>
                    <div className="room-players">
                        {playerList.map(p=>(
                            <div key={p.id} className={`room-player-card ${p.id===myId?'me':''} ${p.isHost?'host-card':''}`}>
                                <div className="room-player-avatar" style={{backgroundColor:COLORS[p.color]||'#444'}}>
                                    {p.online?'👤':'💤'}
                                </div>
                                <div>
                                    <div className="room-player-name">
                                        {p.name}
                                        <span className={p.online?'online-badge':'offline-badge'}/>
                                    </div>
                                    <div className="room-player-badge">
                                        {p.isHost?`👑 ${t.host}`:''}
                                        {p.id===myId?` · ${t.youLabel}`:''}
                                    </div>
                                </div>
                            </div>
                        ))}
                        {Array.from({length:emptySlots},(_,i)=>(
                            <div key={`empty${i}`} className="room-player-card empty-slot">
                                <div className="room-player-avatar">＋</div>
                                <div className="room-player-badge">{t.slot}</div>

                        ))}

                                    {m.type!=='system'&&<span className="sender" style={{color:COLORS[playerList.find(p=>p.name===m.sender)?.color]||'var(--c1)'}}>{m.sender}: </span>}
                                    {m.text}
                                </div>

                        </div>
                        <div className="chat-input-row">
                            <input className="chat-input" placeholder={t.chatPlaceholder} value={chatInput}

                    </div>

                        <button className="primary-btn" onClick={startOnlineGame}>{t.startOnline}</button>

                    {isHost && !room.gameStarted && onlinePlayers.length < 2 && (
                        <div style={{textAlign:'center',color:'var(--muted)',padding:'1rem',fontSize:'0.9rem'}}>{t.waitingFor}</div>
                    )}
                    {!isHost && !room.gameStarted && (
                        <div style={{textAlign:'center',color:'var(--muted)',padding:'1rem',fontSize:'0.9rem'}}>{t.waitingFor}</div>
                    )}
                </div>
            </div>
        );
    };

    const renderOnlineGame = () => {
        if (!room) return null;
        const r = room;
        const playerList = Object.values(r.players||{}).filter(p=>p.online).sort((a,b)=>a.idx-b.idx);
        if (!playerList.length) return null;
        const curPlayer = playerList[r.currentPlayerIdx % playerList.length];
        const isMyTurn  = curPlayer?.id === myId;
        const dotsData  = r.dots || {};
        const squaresData = r.squares ? (Array.isArray(r.squares) ? r.squares : Object.values(r.squares)) : [];

        if (r.gameFinished) {
            const sorted=[...playerList].sort((a,b)=>(b.score||0)-(a.score||0));
            const best=sorted[0];
            const isDraw=sorted.filter(p=>(p.score||0)===(best.score||0)).length>1;
            return(
                <div className="winner-overlay">
                    <div className="winner-box">
                        <div className="winner-emoji">{isDraw?'🤝':'🏆'}</div>
                        <div className="winner-title">{isDraw?t.draw:t.victory}</div>
                        {!isDraw&&<div className="winner-name" style={{color:COLORS[best.color]}}>{best.name}</div>}
                        <div className="final-list">
                            {sorted.map(p=>(

                                    <div className="fr-name"><div style={{width:14,height:14,borderRadius:'50%',backgroundColor:COLORS[p.color]}}/>{p.name}{p.id===myId?` (${t.youLabel})`:''}</div>
                                    <div className="fr-score">{p.score||0} {(p.score||0)>1?t.squares:t.square}</div>

                            <div className="score-title">{t.scoreboard}</div>

                                <div className="chat-messages">

                                    <input className="chat-input" placeholder={t.chatPlaceholder} value={chatInput}

                                    <button className="chat-send" onClick={sendChatMsg}>↑</button>
                                </div>
                            </div>
                        </div>

                </div>
            </div>
        );
    };

    const renderManual = () => (
        <div className="manual-wrap">
            <div className="card">
                <div className="card-title">📖 {t.manualTitle} <span className="tag">v2.1</span></div>
                <p className="manual-p" style={{color:'var(--muted)'}}>{t.manualSub}</p>
                <div className="manual-section-title">🎯 {t.sec1}</div>

                </ol>
                <div className="manual-section-title">♟️ {t.sec4}</div>
                {[{t:t.tip1t,b:t.tip1},{t:t.tip2t,b:t.tip2},{t:t.tip3t,b:t.tip3},{t:t.tip4t,b:t.tip4}].map((tip,i)=>(
                    <div key={i} className="tip-card"><strong>💡 {tip.t}</strong><p>{tip.b}</p></div>

                <div className="manual-section-title">🤖 {t.sec5}</div>

                    {[{c:'easy',e:'😊',n:t.easy,d:t.diff_easy},{c:'medium',e:'🧠',n:t.mediumD,d:t.diff_med},{c:'hard',e:'🔥',n:t.hard,d:t.diff_hard}].map(x=>(
                        <div key={x.c} className={`diff-pill-card ${x.c}`}><div className="dpt">{x.e} {x.n}</div><p>{x.d}</p></div>

                <ol className="manual-ol">

    // ═══════════════════════════════════════════════════════════════════════════

            </div>
            <div className="main">
                {tab==='play'   && gameState==='setup'    && renderSetup()}
                {tab==='play'   && gameState==='playing'  && renderLocalGame()}
                {tab==='play'   && gameState==='finished' && renderLocalGame()}
                {tab==='play'   && gameState==='finished' && renderLocalWinner()}
                {tab==='online' && onlineMode==='lobby'   && renderOnlineLobby()}
                {tab==='online' && onlineMode==='room'    && renderOnlineRoom()}
                {tab==='online' && onlineMode==='game'    && renderOnlineGame()}
                {tab==='manual' && renderManual()}
            </div>
            {notif && <div className={`notif ${notif.type}`}>{notif.msg}</div>}
        </div>
    );
};

ReactDOM.render(<App/>, document.getElementById('root'));
</script>

<script>
document.addEventListener('touchstart',e=>{if(e.touches.length>1)e.preventDefault();},{passive:false});
let lt=0;
document.addEventListener('touchend',e=>{const n=Date.now();if(n-lt<300)e.preventDefault();lt=n;},{passive:false});
document.addEventListener('wheel',e=>{if(e.ctrlKey)e.preventDefault();},{passive:false});
</script>
</body>
</html>
